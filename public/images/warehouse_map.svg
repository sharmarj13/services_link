<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="400" height="300" fill="#f8fafc" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)" rx="12"/>

  <!-- Compass / North Indicator -->
  <g transform="translate(360, 40)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="-10" stroke="#ef4444" stroke-width="1.5"/>
    <polygon points="0,-12 -4,-4 4,-4" fill="#ef4444"/>
    <text x="-4" y="22" font-family="sans-serif" font-size="8" font-weight="bold" fill="#64748b">N</text>
  </g>

  <!-- Title block -->
  <text x="20" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0f172a">SITE PLAN: WAREHOUSE D</text>
  <text x="20" y="50" font-family="sans-serif" font-size="9" fill="#64748b">PROJECT OAKWOOD RESIDENCES - OCT 2026</text>

  <!-- Zone A Section -->
  <rect x="20" y="80" width="150" height="80" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="6" stroke-dasharray="4,3"/>
  <text x="30" y="100" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991b1b">ZONE A - STORAGE</text>
  <text x="30" y="118" font-family="sans-serif" font-size="8" fill="#7f1d1d">Rebar &amp; Gravel Yard</text>
  <rect x="30" y="130" width="40" height="15" fill="#fee2e2" stroke="#f87171" stroke-width="1" rx="2"/>
  <text x="35" y="141" font-family="sans-serif" font-size="7" font-weight="bold" fill="#991b1b">SECURED</text>

  <!-- Warehouse D Section -->
  <rect x="200" y="80" width="180" height="180" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" rx="6"/>
  <text x="210" y="102" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1e3a8a">WAREHOUSE D</text>
  <text x="210" y="120" font-family="sans-serif" font-size="8" fill="#1e40af">Bay 14 - HVAC Unit Area</text>
  
  <!-- Internal structure grid inside Warehouse D -->
  <line x1="210" y1="140" x2="370" y2="140" stroke="#dbeafe" stroke-width="1"/>
  <line x1="210" y1="180" x2="370" y2="180" stroke="#dbeafe" stroke-width="1"/>
  <line x1="210" y1="220" x2="370" y2="220" stroke="#dbeafe" stroke-width="1"/>
  <line x1="250" y1="140" x2="250" y2="260" stroke="#dbeafe" stroke-width="1"/>
  <line x1="300" y1="140" x2="300" y2="260" stroke="#dbeafe" stroke-width="1"/>
  <line x1="350" y1="140" x2="350" y2="260" stroke="#dbeafe" stroke-width="1"/>

  <!-- HVAC unit callout -->
  <rect x="260" y="190" width="30" height="20" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1" rx="2"/>
  <text x="265" y="202" font-family="sans-serif" font-size="7" font-weight="bold" fill="#ffffff">HVAC-04</text>
  <circle cx="290" cy="190" r="3" fill="#ef4444"/>

  <!-- Tower Crane location -->
  <g transform="translate(100, 220)">
    <circle cx="0" cy="0" r="22" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#047857"/>
    <!-- Crane jib/arm line -->
    <line x1="0" y1="0" x2="25" y2="-25" stroke="#047857" stroke-width="2"/>
    <circle cx="25" cy="-25" r="2" fill="#ef4444"/>
    <text x="-25" y="34" font-family="sans-serif" font-size="8" font-weight="bold" fill="#065f46">TOWER CRANE 1</text>
  </g>

  <!-- Legend -->
  <rect x="20" y="270" width="360" height="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <circle cx="30" cy="280" r="4" fill="#3b82f6"/>
  <text x="38" y="283" font-family="sans-serif" font-size="7" fill="#475569">HVAC Units</text>
  
  <circle cx="100" cy="280" r="4" fill="#ef4444"/>
  <text x="108" y="283" font-family="sans-serif" font-size="7" fill="#475569">Hotspots</text>
  
  <rect x="170" y="277" width="10" height="6" fill="#fee2e2" stroke="#f87171" stroke-width="0.5"/>
  <text x="185" y="283" font-family="sans-serif" font-size="7" fill="#475569">Secured Zone</text>
</svg>
